services:
  authelia:
    container_name: authelia
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      timeout: 3s
    image: authelia/authelia:4.37
    labels:
      - traefik.enable=true
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.rule=Host(`oauth.localhost`)
      - traefik.http.routers.authelia.tls=true
      - traefik.http.services.authelia.loadbalancer.server.port=80
    volumes:
      - ./authelia-test.yaml:/config/configuration.yml
      - ./authelia-test-users.yaml:/config/users.yaml
      - ./logo.png:/config/assets/logo.png
  grafana:
    container_name: grafana
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      timeout: 3s
    image: grafana/grafana:12.3.0
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.rule=Host(`grafana.localhost`)
      - traefik.http.routers.grafana.tls=true
      - traefik.http.services.grafana.loadbalancer.server.port=80
    volumes:
      - ./grafana-test.ini:/etc/grafana/grafana.ini
  loki:
    container_name: loki
    image: grafana/loki:3.6.4
    volumes:
      - ./loki-test.yaml:/etc/loki/local-config.yaml
  ntfy:
    command: serve
    container_name: ntfy
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/v1/health"]
      timeout: 3s
    image: binwiederhier/ntfy:v2.16.0
    labels:
      - traefik.enable=true
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.rule=Host(`ntfy.localhost`)
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.services.ntfy.loadbalancer.server.port=80
    volumes:
      - ntfy:/etc/ntfy/data
      - ./ntfy-test.yaml:/etc/ntfy/server.yml
  postgres:
    container_name: postgres
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 3s
    image: postgres:16.2
    ports:
      - "5432:5432"
  postgres-exporter:
    command:
      - --web.listen-address=:80
    container_name: postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_PASS:
      DATA_SOURCE_URI: postgres:5432/?sslmode=disable
      DATA_SOURCE_USER: postgres
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/metrics"]
      timeout: 3s
    image: quay.io/prometheuscommunity/postgres-exporter:v0.18.1
  prometheus:
    container_name: prometheus
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      timeout: 3s
    image: prom/prometheus:v3.9.1
    volumes:
      - ./prometheus-test.yaml:/etc/prometheus/prometheus.yml
  promtail:
    container_name: promtail
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /ready HTTP/1.0\\r\\n\\r\\n\" > /dev/tcp/localhost/80'"]
      timeout: 3s
    image: grafana/promtail:3.6.4
    volumes:
      - $HOME/.docker/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-test.yaml:/etc/promtail/config.yml
  traefik:
    command:
      - --accesslog=true
      - --entrypoints.traefik.address=:81
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.websecure.address=:443
      - --log.noColor=true
      - --metrics.prometheus=true
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
    container_name: traefik
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 5s
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:81/ping"]
      timeout: 3s
    image: traefik:v3.6.14
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - $HOME/.docker/run/docker.sock:/var/run/docker.sock:ro
  utils:
    command: >-
      bash -c '
        cd /etc/utils;
        pip install -r requirements.txt -q &&
        for script in *.py; do
          python "$$script" &
        done;
        wait'
    container_name: utils
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_PASSWORD: ""
      DB_USERNAME: postgres
      NTFY_DB_PATH: /etc/ntfy/data/user.db
    image: python:3.13-slim
    volumes:
      - ntfy:/etc/ntfy/data
      - ./utils:/etc/utils
volumes:
  ntfy:
