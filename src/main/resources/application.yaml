app:
  clients:
    ciafo:
      caller: "come-in-and-find-out"
      origin: "https://come-in-and-find-out.ch"
    peeps:
      caller: "gaiapeeps"
      origin: "https://gaiapeeps.com"
    soup:
      caller: "soupart"
      origin: "https://soupart.net"
  services:
    grafana:
      url: "https://grafana.outsideworx.net"
    loki:
      url: "http://loki"
    ntfy:
      url: "https://ntfy.outsideworx.net"
management:
  endpoints:
    web:
      exposure:
        include: prometheus
  server:
    port: 81
server:
  forward-headers-strategy: native
  port: 80
  tomcat:
    max-part-count: 50
spring:
  cache:
    caffeine:
      spec: maximumSize=76
    type: caffeine
  datasource:
    url: jdbc:postgresql://postgres:5432/
  jackson:
    default-property-inclusion: NON_EMPTY
  liquibase:
    change-log: classpath:db/changelog-master.yaml
  logout:
    url: https://oauth.outsideworx.net/logout?rd=https://services.outsideworx.net
  security:
    oauth2:
      client:
        provider:
          authelia:
            authorization-uri: https://oauth.outsideworx.net/api/oidc/authorization
            jwk-set-uri: http://authelia/jwks.json
            token-uri: http://authelia/api/oidc/token
            user-info-uri: http://authelia/api/oidc/userinfo
            user-name-attribute: preferred_username
        registration:
          authelia:
            authorization-grant-type: authorization_code
            client-id: services
            provider: authelia
            redirect-uri: "{baseUrl}/login/oauth2/code/authelia"
            scope: email,groups,openid,profile
  servlet:
    multipart:
      max-file-size: 4MB
      max-request-size: 64MB