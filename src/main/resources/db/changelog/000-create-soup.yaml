databaseChangeLog:
  - changeSet:
      id: 000-create-soup
      author: services
      comment: Creates the soup table for soupart client images
      changes:
        - sql:
            sql: |
              CREATE SEQUENCE IF NOT EXISTS soup_seq START WITH 1 INCREMENT BY 50;
              CREATE TABLE IF NOT EXISTS soup (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                category VARCHAR(255),
                description VARCHAR(255),
                hash VARCHAR(255),
                image TEXT,
                thumbnail TEXT,
                link VARCHAR(255)
              );
