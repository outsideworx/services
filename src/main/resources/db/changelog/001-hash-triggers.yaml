databaseChangeLog:
  - changeSet:
      id: 001-ciafo-hash-trigger
      author: outsideworx
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION compute_ciafo_hash() RETURNS TRIGGER AS $$
              BEGIN
                NEW.hash = encode(sha256(convert_to(
                  COALESCE(NEW.image1, '') ||
                  COALESCE(NEW.image2, '') ||
                  COALESCE(NEW.image3, '') ||
                  COALESCE(NEW.image4, '') ||
                  COALESCE(NEW.thumbnail1, '') ||
                  COALESCE(NEW.thumbnail2, '') ||
                  COALESCE(NEW.thumbnail3, '') ||
                  COALESCE(NEW.thumbnail4, ''), 'UTF8')), 'hex');
                RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE OR REPLACE TRIGGER ciafo_hash_trigger
              BEFORE INSERT OR UPDATE ON ciafo
              FOR EACH ROW EXECUTE FUNCTION compute_ciafo_hash();

  - changeSet:
      id: 001-soup-hash-trigger
      author: outsideworx
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION compute_soup_hash() RETURNS TRIGGER AS $$
              BEGIN
                NEW.hash = encode(sha256(convert_to(
                  COALESCE(NEW.image, '') ||
                  COALESCE(NEW.thumbnail, ''), 'UTF8')), 'hex');
                RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE OR REPLACE TRIGGER soup_hash_trigger
              BEFORE INSERT OR UPDATE ON soup
              FOR EACH ROW EXECUTE FUNCTION compute_soup_hash();
