databaseChangeLog:
  - changeSet:
      id: 000-create-callback
      author: services
      comment: Creates the callback table for contact form submissions
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS callback (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                address VARCHAR(255),
                processed BOOLEAN,
                product VARCHAR(255),
                recipient VARCHAR(255)
              );
