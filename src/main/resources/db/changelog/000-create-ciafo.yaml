databaseChangeLog:
  - changeSet:
      id: 000-create-ciafo
      author: services
      comment: Creates the ciafo table for come-in-and-find-out client images
      changes:
        - sql:
            sql: |
              CREATE SEQUENCE IF NOT EXISTS ciafo_seq START WITH 1 INCREMENT BY 50;
              CREATE TABLE IF NOT EXISTS ciafo (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                category VARCHAR(255),
                description VARCHAR(255),
                hash VARCHAR(255),
                image1 TEXT,
                image2 TEXT,
                image3 TEXT,
                image4 TEXT,
                thumbnail1 TEXT,
                thumbnail2 TEXT,
                thumbnail3 TEXT,
                thumbnail4 TEXT
              );
