databaseChangeLog:
  - changeSet:
      id: 000-create-peeps
      author: services
      comment: Creates the peeps table for gaiapeeps client links
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS peeps (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                link VARCHAR(255),
                title VARCHAR(255)
              );
