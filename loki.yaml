server:
  http_listen_port: 80
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  filesystem:
    directory: /loki/chunks
compactor:
  retention_enabled: true
  delete_request_store: filesystem
limits_config:
  retention_period: 365d