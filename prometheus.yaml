global:
  scrape_interval: 1m
scrape_configs:
  - job_name: loki
    static_configs:
      - targets: [ "loki" ]
  - job_name: ntfy
    static_configs:
      - targets: [ "ntfy" ]
  - job_name: postgres-exporter
    static_configs:
      - targets: [ "postgres-exporter:9187" ]
  - job_name: sites
    static_configs:
      - targets: [
        "come-in-and-find-out",
        "duckumbrella",
        "gaiapeeps",
        "igli",
        "outsideworx",
        "soupart",
        "soupkitchen",
        "thegreen"
      ]
  - job_name: services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "services" ]
  - job_name: traefik
    static_configs:
      - targets: [ "traefik:8080" ]