name: Deploy
on:
  workflow_dispatch:
    inputs:
      flags:
        default: ''
        description: 'Flags to pass to deploy.sh'
        required: false
      host:
        default: 'services.outsideworx.net'
        description: 'SSH host to deploy to'
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.event.inputs.host }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            [ -d src/services ] || git clone https://github.com/outsideworx/services.git src/services
            cd src/services
            [ -f .env ] || echo "${{ secrets.ENV }}" > .env
            git pull
            bash deploy.sh "${{ github.event.inputs.flags }}"
