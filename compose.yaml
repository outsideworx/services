networks:
  outsideworx:
    external: true
services:
  grafana:
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.grafana.entrypoints=websecure
        - traefik.http.routers.grafana.rule=Host(`grafana.outsideworx.net`)
        - traefik.http.routers.grafana.tls.certresolver=letsencrypt
        - traefik.http.services.grafana.loadbalancer.server.port=80
    environment:
      GF_SECURITY_ADMIN_USER: $GF_SECURITY_ADMIN_USER
      GF_SECURITY_ADMIN_PASSWORD: $GF_SECURITY_ADMIN_PASSWORD
    image: grafana/grafana:12.3.0
    networks:
      - outsideworx
    user: root
    volumes:
      - /home/outsideworx/grafana:/var/lib/grafana
      - ./grafana.ini:/etc/grafana/grafana.ini
  loki:
    deploy:
      placement:
        constraints:
          - node.role == manager
    image: grafana/loki:3.6.4
    networks:
      - outsideworx
    user: root
    volumes:
      - /home/outsideworx/loki:/loki
      - ./loki.yaml:/etc/loki/local-config.yaml
  ntfy:
    command: serve
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.ntfy.entrypoints=websecure
        - traefik.http.routers.ntfy.rule=Host(`ntfy.outsideworx.net`)
        - traefik.http.routers.ntfy.tls.certresolver=letsencrypt
        - traefik.http.services.ntfy.loadbalancer.server.port=80
    environment:
      NTFY_WEB_PUSH_PUBLIC_KEY: $NTFY_WEB_PUSH_PUBLIC_KEY
      NTFY_WEB_PUSH_PRIVATE_KEY: $NTFY_WEB_PUSH_PRIVATE_KEY
    image: binwiederhier/ntfy:v2.16.0
    networks:
      - outsideworx
    volumes:
      - /home/outsideworx/ntfy:/etc/ntfy/data
      - ./ntfy.yaml:/etc/ntfy/server.yml
  postgres:
    deploy:
      placement:
        constraints:
          - node.role == manager
    environment:
      POSTGRES_USER: $SPRING_DATASOURCE_USERNAME
      POSTGRES_PASSWORD: $SPRING_DATASOURCE_PASSWORD
    image: postgres:16.2
    networks:
      - outsideworx
    volumes:
      - /home/outsideworx/data:/var/lib/postgresql/data
  postgres-exporter:
    command:
      - --web.listen-address=:81
    deploy:
      placement:
        constraints:
          - node.role == manager
    environment:
      DATA_SOURCE_URI: postgres:5432/?sslmode=disable
      DATA_SOURCE_USER: $SPRING_DATASOURCE_USERNAME
      DATA_SOURCE_PASS: $SPRING_DATASOURCE_PASSWORD
    image: quay.io/prometheuscommunity/postgres-exporter:v0.18.1
    networks:
      - outsideworx
  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=365d
    deploy:
      placement:
        constraints:
          - node.role == manager
    image: prom/prometheus:v3.9.1
    networks:
      - outsideworx
    user: root
    volumes:
      - /home/outsideworx/prometheus:/prometheus
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
  services:
    build: .
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.services.entrypoints=websecure
        - traefik.http.routers.services.rule=Host(`services.outsideworx.net`)
        - traefik.http.routers.services.tls.certresolver=letsencrypt
        - traefik.http.services.services.loadbalancer.server.port=80
    environment:
      APP_CLIENTS_CIAFO_TOKEN: $APP_CLIENTS_CIAFO_TOKEN
      APP_CLIENTS_PEEPS_TOKEN: $APP_CLIENTS_PEEPS_TOKEN
      APP_CLIENTS_SOUP_TOKEN: $APP_CLIENTS_SOUP_TOKEN
      MAILERSEND_SDK_TOKEN: $MAILERSEND_SDK_TOKEN
      SPRING_DATASOURCE_USERNAME: $SPRING_DATASOURCE_USERNAME
      SPRING_DATASOURCE_PASSWORD: $SPRING_DATASOURCE_PASSWORD
    image: outsideworx/services:latest
    networks:
      - outsideworx
  traefik:
    command:
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=info@outsideworx.net
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.traefik.address=:81
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.websecure.address=:443
      - --metrics.prometheus=true
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
    deploy:
      placement:
        constraints:
          - node.role == manager
    image: traefik:v3.6.12
    networks:
      - outsideworx
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /home/outsideworx/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
  utils:
    command: >-
      bash -c '
      cd /etc/utils &&
      pip install -r requirements.txt -q &&
      for script in *.py;
      do python "$$script" & done;
      wait'
    deploy:
      placement:
        constraints:
          - node.role == manager
    environment:
      DB_USERNAME: $SPRING_DATASOURCE_USERNAME
      DB_PASSWORD: $SPRING_DATASOURCE_PASSWORD
      LOKI_PORT: 80
    image: python:3.13-slim
    networks:
      - outsideworx
    volumes:
      - /home/outsideworx/utils:/utils
      - ./utils:/etc/utils
