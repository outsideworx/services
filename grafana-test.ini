[auth]
disable_login_form = true

[auth.generic_oauth]
allow_assign_grafana_admin = true
allow_sign_up = true
auto_login = true
api_url = http://authelia/api/oidc/userinfo
auth_url = https://oauth.localhost/api/oidc/authorization
client_id = grafana
client_secret = grafana_client_secret
enabled = true
name = Authelia
role_attribute_path = contains(groups[*], 'admin') && 'GrafanaAdmin' || 'Viewer'
scopes = openid groups profile email
signout_redirect_url = https://oauth.localhost/logout?rd=https://grafana.localhost
token_url = http://authelia/api/oidc/token

[users]
auto_assign_org = true

[server]
http_port = 80
root_url = https://grafana.localhost