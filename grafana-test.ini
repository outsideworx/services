[auth]
disable_login_form = true

[auth.generic_oauth]
allow_assign_grafana_admin = true
allow_sign_up = true
api_url = http://authelia/api/oidc/userinfo
auth_url = https://oauth.localhost/api/oidc/authorization
auto_login = true
client_id = grafana
client_secret = grafana
enabled = true
name = Authelia
role_attribute_path = groups && contains(groups, 'admin') && 'GrafanaAdmin' || 'Viewer'
scopes = email groups openid profile
signout_redirect_url = https://oauth.localhost/logout
token_url = http://authelia/api/oidc/token

[server]
http_port = 80
root_url = https://grafana.localhost

[users]
auto_assign_org = true