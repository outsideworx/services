clients:
  - url: http://loki/loki/api/v1/push
positions:
  filename: /promtail/positions.yaml
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_swarm_service_name]
        regex: (.+)_.+
        target_label: job
      - source_labels: [__meta_docker_container_label_com_docker_swarm_service_name]
        regex: .+_(.+)
        target_label: app
server:
  http_listen_port: 80
