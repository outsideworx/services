global:
  scrape_interval: 5s
scrape_configs:
  - job_name: authelia
    static_configs:
      - targets: [ "authelia:81" ]
  - job_name: loki
    static_configs:
      - targets: [ "loki:3100" ]
  - job_name: ntfy
    static_configs:
      - targets: [ "ntfy:81" ]
  - job_name: postgres-exporter
    static_configs:
      - targets: [ "postgres-exporter:81" ]
  - job_name: sites
    static_configs:
      - targets: [
        "come-in-and-find-out",
        "gaiapeeps",
        "soupart"
      ]
  - job_name: services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "host.docker.internal:81" ]
  - job_name: traefik
    static_configs:
      - targets: [ "traefik:81" ]