auth_enabled: false
common:
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1
compactor:
  delete_request_store: filesystem
  retention_enabled: true
limits_config:
  retention_period: 7d
schema_config:
  configs:
    - from: 2020-10-24
      object_store: filesystem
      schema: v13
      store: tsdb
      index:
        prefix: index_
        period: 24h
server:
  http_listen_port: 80
storage_config:
  filesystem:
    directory: /tmp/loki/chunks
  tsdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/index_cache
