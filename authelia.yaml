access_control:
  default_policy: one_factor
authentication_backend:
  file:
    path: /config/users.yaml
default_redirection_url: https://services.outsideworx.net
identity_providers:
  oidc:
    clients:
      - authorization_policy: one_factor
        consent_mode: implicit
        id: grafana
        redirect_uris:
          - https://grafana.outsideworx.net/login/generic_oauth
        scopes:
          - email
          - groups
          - openid
          - profile
        secret: "$pbkdf2-sha512$310000$NNaJy.5bp4jfw..YfyVUnA$9nnLuxwrkQIi6RzyS2LTy3TskY72u8cK4Yi15aZG18XkLHJDm44T4M5ebTjLBgYEtzqO97YNam6bE5SxYpP/PQ"
      - authorization_policy: one_factor
        consent_mode: implicit
        id: services
        redirect_uris:
          - https://services.outsideworx.net/login/oauth2/code/authelia
        scopes:
          - email
          - groups
          - openid
          - profile
        secret: "$pbkdf2-sha512$310000$qD2v/qVqphER2Y2QYa1asQ$INKnVdFBsNSMC9FjyYgwMaFdy6EpRGeMmUmLikGF9EVCZBUwvGBa6T1NOzUX7jdAXEhj3ZzqCDwCd81X0FQ4ww"
    hmac_secret: $AUTHELIA_HMAC_SECRET
    issuer_private_key_file: /run/secrets/rsa_private_key
jwt_secret: $AUTHELIA_JWT_SECRET
notifier:
  smtp:
    host: smtp.mailersend.net
    password: $AUTHELIA_SMTP_PASSWORD
    port: 587
    sender: info@outsideworx.net
    username: $AUTHELIA_SMTP_USERNAME
server:
  asset_path: /config/assets
  port: 80
session:
  domain: outsideworx.net
  secret: $AUTHELIA_SESSION_SECRET
storage:
  encryption_key: $AUTHELIA_STORAGE_ENCRYPTION_KEY
  local:
    path: /tmp/authelia-storage.db
telemetry:
  metrics:
    address: tcp://0.0.0.0:81
    enabled: true
theme: auto